<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Agent News</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-soft: #d8f3ef;
      --danger: #9a3412;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111418;
        --panel: #1b2027;
        --text: #eef2f7;
        --muted: #a4adba;
        --line: #333b46;
        --accent: #5eead4;
        --accent-soft: #163c39;
        --danger: #fdba74;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      line-height: 1.7;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 13px 14px 10px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0;
    }
    button {
      min-height: 38px;
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      border-radius: 8px;
      background: var(--accent);
      color: var(--panel);
      padding: 8px 13px;
      font: inherit;
      font-size: 14px;
      font-weight: 720;
      cursor: pointer;
    }
    button:disabled { opacity: 0.65; cursor: wait; }
    .status {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .status.error { color: var(--danger); }
    main {
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .stat, .card, .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .stat { padding: 9px 10px; }
    .stat strong {
      display: block;
      font-size: 17px;
      line-height: 1.25;
    }
    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }
    .card { padding: 14px; }
    .story-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    h2 {
      margin: 6px 0 0;
      font-size: 16px;
      line-height: 1.45;
      letter-spacing: 0;
    }
    .body {
      margin: 9px 0 0;
      font-size: 14px;
      line-height: 1.76;
      overflow-wrap: anywhere;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .tag {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 12px;
      font-weight: 650;
    }
    details {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }
    summary {
      width: fit-content;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
    }
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .sources a {
      display: inline-flex;
      gap: 5px;
      max-width: 100%;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent-soft) 60%, var(--panel));
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      text-decoration: none;
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .sources span { color: var(--muted); }
    .empty {
      color: var(--muted);
      padding: 14px;
    }
    @media (max-width: 480px) {
      button { width: 100%; }
      h2 { font-size: 15px; }
      .body { font-size: 13.5px; line-height: 1.72; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Research Agent News</h1>
    <button id="loadButton" type="button">読み込む</button>
    <p id="status" class="status">ChatGPTに接続されたresearch-agentから読み込みます。</p>
  </header>
  <main>
    <section id="meta" class="meta" hidden></section>
    <section id="cards" class="cards">
      <div class="empty">まだニュースを読み込んでいません。</div>
    </section>
  </main>
  <script>
    const statusEl = document.getElementById("status");
    const loadButton = document.getElementById("loadButton");
    const metaEl = document.getElementById("meta");
    const cardsEl = document.getElementById("cards");
    let rpcId = 0;
    const pendingRequests = new Map();

    const formatDateTime = (value) => {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value || "";
      return new Intl.DateTimeFormat("ja-JP", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    };

    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    })[char]);

    const setStatus = (message, isError = false) => {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", Boolean(isError));
    };

    const renderMeta = (data) => {
      const counts = data.counts || {};
      metaEl.hidden = false;
      metaEl.innerHTML = [
        ["記事", counts.unique_records ?? counts.records ?? 0],
        ["RSS", counts.rss_articles ?? 0],
        ["更新", formatDateTime(data.generated_at)]
      ].map(([label, value]) => `<div class="stat"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>`).join("");
    };

    const renderSources = (sources) => {
      if (!Array.isArray(sources) || !sources.length) return "";
      const links = sources.map((source) => {
        const label = source.source_name || source.original_title || source.title || "source";
        return `<a href="${escapeHtml(source.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}<span>${escapeHtml(formatDateTime(source.published_at))}</span></a>`;
      }).join("");
      return `<details><summary>元記事 ${sources.length}本</summary><div class="sources">${links}</div></details>`;
    };

    const render = (data) => {
      const stories = Array.isArray(data?.top) ? data.top : [];
      renderMeta(data || {});
      if (!stories.length) {
        cardsEl.innerHTML = '<div class="empty">表示できるニュースがありません。</div>';
        return;
      }
      cardsEl.innerHTML = stories.map((story) => {
        const tags = Array.isArray(story.tags) ? story.tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("") : "";
        return `<article class="card">
          <div class="story-meta">
            <span>${escapeHtml(story.time_label || formatDateTime(story.representative_published_at))}</span>
            <span>${escapeHtml(story.media_count)}媒体</span>
            <span>${escapeHtml(story.article_count)}本</span>
          </div>
          <h2>${escapeHtml(story.title)}</h2>
          <p class="body">${escapeHtml(story.body)}</p>
          ${tags ? `<div class="tags">${tags}</div>` : ""}
          ${renderSources(story.sources)}
        </article>`;
      }).join("");
    };

    const updateFromResponse = (response) => {
      const data = response?.structuredContent;
      if (!data) return;
      render(data);
      const refreshed = data.refresh_policy?.refreshed ? "更新しました" : "キャッシュを表示しています";
      setStatus(`${refreshed}。生成時点: ${formatDateTime(data.generated_at)}`);
    };

    const rpcNotify = (method, params) => {
      window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
    };

    const rpcRequest = (method, params) =>
      new Promise((resolve, reject) => {
        const id = ++rpcId;
        pendingRequests.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
      });

    window.addEventListener("message", (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (!message || message.jsonrpc !== "2.0") return;

      if (typeof message.id === "number") {
        const pending = pendingRequests.get(message.id);
        if (!pending) return;
        pendingRequests.delete(message.id);
        if (message.error) pending.reject(message.error);
        else pending.resolve(message.result);
        return;
      }

      if (message.method === "ui/notifications/tool-result") {
        updateFromResponse(message.params);
      }
    }, { passive: true });

    const bridgeReady = (async () => {
      if (window.parent === window) {
        throw new Error("This widget must run inside ChatGPT.");
      }
      await rpcRequest("ui/initialize", {
        appInfo: { name: "research-agent-news-widget", version: "0.1.0" },
        appCapabilities: {},
        protocolVersion: "2026-01-26"
      });
      rpcNotify("ui/notifications/initialized", {});
    })();

    const callNewsTool = async () => {
      await bridgeReady;
      const response = await rpcRequest("tools/call", {
        name: "read_research_agent_news",
        arguments: { limit: 12, refresh: "if_stale" }
      });
      updateFromResponse(response);
    };

    loadButton.addEventListener("click", async () => {
      loadButton.disabled = true;
      setStatus("読み込み中です。");
      try {
        await callNewsTool();
      } catch (error) {
        console.error(error);
        setStatus("読み込みに失敗しました。ChatGPTのコネクタ設定を確認してください。", true);
      } finally {
        loadButton.disabled = false;
      }
    });

    bridgeReady.catch(() => {
      setStatus("この画面はChatGPTアプリ内で表示してください。", true);
    });
  </script>
</body>
</html>

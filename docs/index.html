<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Agent News</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-soft: #d8f3ef;
      --danger: #9a3412;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111418;
        --panel: #1b2027;
        --text: #eef2f7;
        --muted: #a4adba;
        --line: #333b46;
        --accent: #5eead4;
        --accent-soft: #163c39;
        --danger: #fdba74;
        --shadow: none;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      line-height: 1.7;
      text-rendering: optimizeLegibility;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 15px max(14px, env(safe-area-inset-left)) 10px;
      box-shadow: var(--shadow);
    }
    main {
      width: min(100%, 820px);
      margin: 0 auto;
      padding: 14px 12px 48px;
    }
    h1 {
      font-size: 20px;
      line-height: 1.25;
      margin: 0 0 8px;
      letter-spacing: 0;
    }
    button {
      min-height: 40px;
      border-radius: 8px;
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      background: var(--accent);
      color: var(--panel);
      padding: 8px 13px;
      font: inherit;
      font-size: 14px;
      font-weight: 720;
      cursor: pointer;
      white-space: nowrap;
    }
    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }
    button:focus-visible, a:focus-visible, summary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin: 7px 0 0;
      overflow-wrap: anywhere;
    }
    .status.error { color: var(--danger); }
    .meta-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 6px 0 15px;
    }
    .stat, .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .stat { padding: 9px 10px; }
    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1.25;
    }
    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }
    .cards {
      display: grid;
      gap: 13px;
    }
    .card {
      padding: 15px;
    }
    .story-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .story-title {
      margin: 6px 0 0;
      font-size: 17px;
      line-height: 1.42;
      font-weight: 760;
      overflow-wrap: anywhere;
    }
    .story-body {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.78;
      overflow-wrap: anywhere;
    }
    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .tag {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }
    details {
      margin-top: 11px;
      border-top: 1px solid var(--line);
      padding-top: 9px;
    }
    summary {
      width: fit-content;
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      padding: 2px 0;
    }
    .source-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .source-list a {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      max-width: 100%;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent-soft) 60%, var(--panel));
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      text-decoration: none;
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .source-list a span { color: var(--muted); }
    .empty {
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    @media (min-width: 720px) {
      main { padding-inline: 18px; }
      .card { padding: 18px; }
      .story-title { font-size: 18px; }
      .story-body { font-size: 14.5px; }
    }
    @media (max-width: 480px) {
      button { width: 100%; }
      .story-title { font-size: 16px; }
      .story-body { font-size: 14px; line-height: 1.72; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Research Agent News</h1>
    <button id="loadButton" type="button">読み込む</button>
    <p id="status" class="status">GitHub Pagesの最新ニュースを読み込みます。</p>
  </header>
  <main>
    <div id="meta" class="meta-bar" hidden></div>
    <div id="stories" class="cards">
      <p class="empty">まだニュースを読み込んでいません。</p>
    </div>
  </main>
  <script>
    const loadButton = document.querySelector("#loadButton");
    const status = document.querySelector("#status");
    const meta = document.querySelector("#meta");
    const stories = document.querySelector("#stories");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatDate(value) {
      const time = Date.parse(value || "");
      if (!Number.isFinite(time)) return "日時不明";
      return new Intl.DateTimeFormat("ja-JP", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(time));
    }

    function renderMeta(payload) {
      const counts = payload.counts || {};
      meta.hidden = false;
      meta.innerHTML = `
        <div class="stat"><strong>${escapeHtml(counts.rss_articles ?? "-")}</strong><span>RSS記事</span></div>
        <div class="stat"><strong>${escapeHtml(payload.top?.length ?? "-")}</strong><span>表示候補</span></div>
        <div class="stat"><strong>${escapeHtml(formatDate(payload.generated_at))}</strong><span>生成時刻</span></div>
      `;
      status.className = "status";
      status.textContent = `GitHub Pagesから読み込みました。生成 ${formatDate(payload.generated_at)}`;
    }

    function renderSources(sources) {
      const items = (sources || []).slice(0, 8).map((source) => {
        const href = escapeHtml(source.url || "#");
        const name = escapeHtml(source.source_name || "source");
        const date = escapeHtml(formatDate(source.published_at));
        const title = escapeHtml(source.title || source.original_title || source.source_name || "");
        return `<a href="${href}" target="_blank" rel="noreferrer" title="${title}">${name}<span>${date}</span></a>`;
      }).join("");
      return `<details><summary>元記事 ${(sources || []).length}本</summary><div class="source-list">${items}</div></details>`;
    }

    function renderStories(payload) {
      const top = payload.top || [];
      if (!top.length) {
        stories.innerHTML = '<p class="empty">表示できるニュースがありません。</p>';
        return;
      }
      stories.innerHTML = top.map((story) => {
        const tags = (story.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
        return `<article class="card">
          <div class="story-meta">
            <span>${escapeHtml(story.time_label || "")}</span>
            <span>${escapeHtml(story.media_count ?? "-")}媒体/${escapeHtml(story.article_count ?? "-")}本</span>
          </div>
          <h2 class="story-title">${escapeHtml(story.title || "")}</h2>
          <p class="story-body">${escapeHtml(story.body || "")}</p>
          ${tags ? `<div class="tags">${tags}</div>` : ""}
          ${renderSources(story.sources)}
        </article>`;
      }).join("");
    }

    async function loadNews() {
      loadButton.disabled = true;
      status.className = "status";
      status.textContent = "読み込み中...";
      try {
        const response = await fetch(`latest.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        renderMeta(payload);
        renderStories(payload);
      } catch (error) {
        status.className = "status error";
        status.textContent = `読み込みに失敗しました: ${error.message}`;
      } finally {
        loadButton.disabled = false;
      }
    }

    loadButton.addEventListener("click", loadNews);
  </script>
</body>
</html>

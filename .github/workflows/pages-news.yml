name: Refresh GitHub Pages news

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"
    - cron: "30 3 * * *"
    - cron: "0 10 * * *"

permissions:
  contents: write

concurrency:
  group: pages-news-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run news:refresh
      - run: npm run pages:export

      - name: Commit updated Pages data
        run: |
          if git diff --quiet -- docs/latest.json; then
            echo "No news data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/latest.json
          git commit -m "Update GitHub Pages news data"
          git push
